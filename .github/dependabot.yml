version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "backend"

  - package-ecosystem: "npm"
    directory: "/server/ui"
    schedule:
      interval: "weekly"
    labels:
      - "frontend"
    open-pull-requests-limit: 5

  - package-ecosystem: "pip"
    directory: "/server"
    schedule:
      interval: "weekly"
    labels:
      - "backend"
    open-pull-requests-limit: 5
