name: Server CI

on:
  push:
    paths:
      - "server/**"
      - ".github/workflows/server-ci.yml"
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/server-ci.yml"

jobs:
  lint-python:
    name: Lint & format (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install "ruff>=0.4"

      - name: Lint
        run: ruff check server/src/

      - name: Format check
        run: ruff format --check server/src/

  typecheck-ui:
    name: Type-check (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: server/ui

      - name: Generate API types from OpenAPI snapshot
        run: npm run typecheck:api
        working-directory: server/ui

      - name: Type check
        run: npx tsc --noEmit
        working-directory: server/ui

      - name: Dead code check
        run: npm run knip
        working-directory: server/ui

  test-python:
    name: Tests & coverage (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r server/requirements.txt -r server/requirements-test.txt

      - name: Run tests
        run: python -m pytest tests/
        working-directory: server

  diff-cover:
    name: Diff coverage (100% on changed lines)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - name: Sibling test advisory check
        run: ./scripts/enforce_sibling_tests.sh

      - name: Build test image
        run: docker compose build test

      - name: Run tests + diff-cover
        run: docker compose run --rm test

  docker-build:
    name: Docker build (smoke test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: server
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
