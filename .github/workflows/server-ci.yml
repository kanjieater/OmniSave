name: Server CI

on:
  push:
    paths:
      - "server/**"
      - ".github/workflows/server-ci.yml"
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/server-ci.yml"

jobs:
  lint-python:
    name: Lint & format (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install "ruff>=0.4"

      - name: Lint
        run: ruff check server/src/

      - name: Format check
        run: ruff format --check server/src/

  typecheck-ui:
    name: Type-check (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: server/ui

      - name: Generate API types from OpenAPI snapshot
        run: npm run typecheck:api
        working-directory: server/ui

      - name: Type check
        run: npx tsc --noEmit
        working-directory: server/ui

      - name: Dead code check
        run: npm run knip
        working-directory: server/ui

  test-python:
    name: Tests & coverage (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r server/requirements.txt -r server/requirements-test.txt

      - name: Run tests
        run: python -m pytest tests/
        working-directory: server

  diff-cover:
    name: Diff coverage (100% on changed lines)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Check out the real branch head (not the detached merge commit) so
          # git push works when we auto-commit a stale spec.
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Sibling test advisory check
        run: ./scripts/enforce_sibling_tests.sh

      - name: Build test image
        run: docker compose build test

      - name: Generate OpenAPI spec
        run: |
          docker compose run --rm test python - << 'PYEOF'
          import sys, json, tempfile
          sys.path.insert(0, "/app/server/src")
          from pathlib import Path

          tmp = Path(tempfile.mkdtemp())
          (tmp / "staging").mkdir()
          (tmp / "archive").mkdir()

          import database as db
          conn = db.open_db(tmp / "spec.db")

          import main, sync_api, sync_deliver_api, activity_api, ui_api
          sync_api.init(conn, tmp / "staging", tmp / "archive")
          sync_deliver_api.init(conn, tmp / "staging", tmp / "archive")
          activity_api.init(conn)
          ui_api.init(conn, tmp / "archive")

          from fastapi.testclient import TestClient
          spec = TestClient(main.app).get("/openapi.json").json()

          out = Path("/app/server/src/openapi.json")
          out.write_text(json.dumps(spec, indent=2) + "\n")
          print(f"Regenerated {out}")
          PYEOF

      - name: Commit spec if stale
        # Only push back on direct pushes; PR auto-commits would create an
        # unchecked commit that blocks merge when branch protection is enabled.
        if: github.event_name == 'push'
        run: |
          if ! git diff --quiet server/src/openapi.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add server/src/openapi.json
            git commit -m "chore: auto-update openapi.json"
            git push
          fi

      - name: Run tests + diff-cover
        run: docker compose run --rm test

  docker-build:
    name: Docker build (smoke test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: server
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
