# Production compose for /mnt/srv/omnisave.
# Secrets and runtime config come from .env only.

services:
  omnisave:
    container_name: omnisave
    image: ghcr.io/kanjieater/omnisave:latest
    build:
      context: ${OMNISAVE_REPO}/server
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    pull_policy: always
    restart: unless-stopped
    logging:
      driver: json-file
    env_file:
      - .env
    ports:
      - "8991:8991"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./data:/app/data
    networks:
      - selfhost

networks:
  selfhost:
    external: true
