[pytest]
testpaths = tests
addopts = --cov=src --cov-config=.coveragerc --cov-report=term-missing --cov-fail-under=80 -n auto --dist loadscope --ignore=tests/test_contract.py
markers =
    contract: schemathesis contract tests (slow — skipped by default; run via docker compose run --rm test-contract)
