<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <defs>
    <pattern id="chaos-circuit" width="800" height="800" patternUnits="userSpaceOnUse">
      <rect width="800" height="800" fill="#11141a"/>
      
      <g fill="none" stroke="#f43f5e" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
        
        <!-- Central Woven Eye Structure -->
        <path d="M -100 400 C 150 150, 650 150, 900 400" />
        <path d="M -100 400 C 150 650, 650 650, 900 400" />
        <path d="M 400 -100 C 150 150, 150 650, 400 900" />
        <path d="M 400 -100 C 650 150, 650 650, 400 900" />

        <path d="M 50 400 C 250 250, 550 250, 750 400" />
        <path d="M 50 400 C 250 550, 550 550, 750 400" />

        <circle cx="400" cy="400" r="140" />
        <circle cx="400" cy="400" r="60" fill="#f43f5e" />

        <!-- Circuit Board Traces & Nodes -->
        <!-- Top Left -->
        <path d="M 0 100 L 150 100 L 250 200 L 250 280" />
        <circle cx="250" cy="280" r="16" />
        <path d="M 100 0 L 100 150 L 180 230 L 180 320" />
        <circle cx="180" cy="320" r="16" />

        <!-- Top Right -->
        <path d="M 800 100 L 650 100 L 550 200 L 550 280" />
        <circle cx="550" cy="280" r="16" />
        <path d="M 700 0 L 700 150 L 620 230 L 620 320" />
        <circle cx="620" cy="320" r="16" />

        <!-- Bottom Left -->
        <path d="M 0 700 L 150 700 L 250 600 L 250 520" />
        <circle cx="250" cy="520" r="16" />
        <path d="M 100 800 L 100 650 L 180 570 L 180 480" />
        <circle cx="180" cy="480" r="16" />

        <!-- Bottom Right -->
        <path d="M 800 700 L 650 700 L 550 600 L 550 520" />
        <circle cx="550" cy="520" r="16" />
        <path d="M 700 800 L 700 650 L 620 570 L 620 480" />
        <circle cx="620" cy="480" r="16" />

        <!-- Interconnecting Chaos Lines -->
        <path d="M -50 250 L 80 250 L 160 170 L 280 170 L 320 130 L 480 130 L 520 170 L 640 170 L 720 250 L 850 250" stroke-width="8" />
        <path d="M -50 550 L 80 550 L 160 630 L 280 630 L 320 670 L 480 670 L 520 630 L 640 630 L 720 550 L 850 550" stroke-width="8" />
        
        <circle cx="320" cy="130" r="8" fill="#f43f5e" />
        <circle cx="480" cy="130" r="8" fill="#f43f5e" />
        <circle cx="320" cy="670" r="8" fill="#f43f5e" />
        <circle cx="480" cy="670" r="8" fill="#f43f5e" />

      </g>
    </pattern>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#chaos-circuit)" />
</svg>
